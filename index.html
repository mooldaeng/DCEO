<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또픽 (LottoPick) - 스마트 로또 관리</title>
    <link rel="stylesheet" href="styles.css">
    <!-- QR 스캐너 라이브러리 CDN -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>LottoPick</h1>
        </header>

        <main id="content">
            <!-- 생성기 탭 -->
            <section id="generator" class="tab-content active">
                <div class="card">
                    <h2>번호 생성</h2>
                    <div class="options">
                        <div class="option-group">
                            <label>포함할 번호 (고정수)</label>
                            <input type="text" id="include-numbers" placeholder="예: 1, 15 (최대 5개)">
                        </div>
                        <div class="option-group">
                            <label>제외할 번호</label>
                            <input type="text" id="exclude-numbers" placeholder="예: 4, 45">
                        </div>
                        <div class="option-group">
                            <label>생성 전략</label>
                            <select id="gen-strategy">
                                <option value="random">일반 랜덤</option>
                                <option value="hot">핫넘버 위주 (자주 나온 수)</option>
                                <option value="cold">콜드넘버 위주 (안 나온 수)</option>
                            </select>
                        </div>
                        <div class="option-group">
                            <label>홀짝 비율</label>
                            <select id="odd-even-ratio">
                                <option value="auto">자동</option>
                                <option value="3:3">3:3</option>
                                <option value="2:4">2:4</option>
                                <option value="4:2">4:2</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="generate-actions">
                        <button id="btn-generate" class="primary">번호 생성하기</button>
                    </div>

                    <div id="result-balls" class="balls-container">
                        <!-- 생성된 공이 여기에 렌더링됨 -->
                    </div>

                    <div id="after-generate" class="hidden">
                        <button id="btn-save-number" class="secondary">내 번호로 저장</button>
                    </div>
                </div>
            </section>

            <!-- 보관함 탭 -->
            <section id="my-numbers" class="tab-content">
                <div class="card">
                    <h2>내 번호 보관함</h2>
                    <div id="saved-list" class="list-container">
                        <p class="empty-msg">저장된 번호가 없습니다.</p>
                    </div>
                </div>
            </section>

            <!-- 결과 탭 -->
            <section id="results" class="tab-content">
                <div class="card">
                    <h2>최신 당첨 결과</h2>
                    <div id="latest-result-info" class="latest-info">
                        <!-- data.js의 최신 정보가 여기에 렌더링됨 -->
                    </div>
                    <hr>
                    <div class="qr-section">
                        <button id="btn-open-scanner" class="primary">QR 코드 스캔</button>
                        <div id="qr-reader" style="width: 100%;" class="hidden"></div>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="generator">
                <span class="icon">🎲</span>
                <span>생성</span>
            </button>
            <button class="nav-item" data-tab="my-numbers">
                <span class="icon">⭐</span>
                <span>보관함</span>
            </button>
            <button class="nav-item" data-tab="results">
                <span class="icon">🏆</span>
                <span>결과</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
